name: iOS xcodebuild
description: Build iOS workspace/scheme with xcpretty
inputs:
    ios-dir:
        description: Path to example/ios directory
        required: true
    scheme:
        description: Xcode scheme to build
        required: false
    mode:
        description: Build configuration (Debug|Release)
        required: true
runs:
    using: composite
    steps:
        - shell: bash
          run: |
              set -euo pipefail
              gem install xcpretty
              cd "${{ inputs.ios-dir }}"
              
              set -o pipefail

              WORKSPACE_NAME="$(find . -maxdepth 1 -name '*.xcworkspace' ! -name 'Pods.xcworkspace' -exec basename {} .xcworkspace \; | head -1)"
              SCHEME_NAME="${{ inputs.scheme }}"

              if [ -z "$WORKSPACE_NAME" ]; then
                echo "No Xcode workspace found in ${{ inputs.ios-dir }}"
                exit 1
              fi

              if [ -z "$SCHEME_NAME" ]; then
                SCHEME_NAME="$WORKSPACE_NAME"
              fi

              echo "Building workspace ${WORKSPACE_NAME}.xcworkspace with scheme ${SCHEME_NAME}"
              
              max_retries=3
              attempt=1
              
              while [ "$attempt" -le "$max_retries" ]
              do
                echo "xcodebuild attempt $attempt of $max_retries"
                
                if xcodebuild \
                  CC=clang CPLUSPLUS=clang++ LD=clang LDPLUSPLUS=clang++ \
                  -derivedDataPath build -UseModernBuildSystem=YES \
                  -workspace "${WORKSPACE_NAME}.xcworkspace" \
                  -scheme "${SCHEME_NAME}" \
                  -sdk iphonesimulator \
                  -configuration "${{ inputs.mode }}" \
                  -destination 'platform=iOS Simulator,name=iPhone 16' \
                  build \
                  CODE_SIGNING_ALLOWED=NO | xcpretty; then
                  echo "xcodebuild succeeded on attempt $attempt"
                  exit 0
                fi
                
                if [ "$attempt" -eq "$max_retries" ]; then
                  echo "xcodebuild failed after $max_retries attempts"
                  exit 1
                fi
                
                attempt=$((attempt + 1))
                echo "Retrying xcodebuild..."
              done
