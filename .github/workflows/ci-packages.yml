name: Packages CI - Build, E2E, PM Tests

on:
    push:
        branches: [next]
        paths:
            - 'src/**'
            - '.github/workflows/**'
            - '.github/actions/**'
            - 'scripts/**'
            - 'package.json'
            - 'bun.lock'
            - 'assets/template/**'
    pull_request:
        branches: [main, next]
        paths:
            - 'src/**'
            - '.github/workflows/**'
            - '.github/actions/**'
            - 'scripts/**'
            - 'package.json'
            - 'bun.lock'
            - 'assets/template/**'
    workflow_dispatch:
    schedule:
        - cron: '0 0 * * *'

permissions:
    contents: write
    actions: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-build:
        name: Lint and Build CLI
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Setup Bun.js
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install

            - name: Lint Code
              run: bun lint

            - name: Build CLI
              run: bun run build

            - name: Test CLI help commands
              run: |
                  node lib/cli/index.js --help
                  node lib/cli/index.js create --help

            - name: Run E2E tests
              run: bun run test:e2e

    define-matrix:
        name: Define Package Matrices
        runs-on: ubuntu-latest
        outputs:
            generation: ${{ steps.set-matrix.outputs.generation }}
            ios-harness: ${{ steps.set-matrix.outputs.ios_harness }}
            android-harness: ${{ steps.set-matrix.outputs.android_harness }}
        steps:
            - name: Build workflow matrices
              id: set-matrix
              shell: bash
              run: |
                  node <<'NODE' >> "$GITHUB_OUTPUT"
                  const pms = ['bun', 'yarn']
                  const scenarios = [
                    {
                      package_type: 'module',
                      scenario: 'swift-kotlin',
                      platforms: 'ios,android',
                      langs: 'swift,kotlin',
                      runs_ios: true,
                      runs_android: true,
                    },
                    {
                      package_type: 'module',
                      scenario: 'cpp',
                      platforms: 'ios,android',
                      langs: 'c++',
                      runs_ios: true,
                      runs_android: true,
                    },
                    {
                      package_type: 'module',
                      scenario: 'swift-cpp',
                      platforms: 'ios,android',
                      langs: 'swift,c++',
                      runs_ios: true,
                      runs_android: true,
                    },
                    {
                      package_type: 'module',
                      scenario: 'cpp-kotlin',
                      platforms: 'ios,android',
                      langs: 'c++,kotlin',
                      runs_ios: true,
                      runs_android: true,
                    },
                    {
                      package_type: 'module',
                      scenario: 'swift',
                      platforms: 'ios',
                      langs: 'swift',
                      runs_ios: true,
                      runs_android: false,
                    },
                    {
                      package_type: 'module',
                      scenario: 'kotlin',
                      platforms: 'android',
                      langs: 'kotlin',
                      runs_ios: false,
                      runs_android: true,
                    },
                    {
                      package_type: 'module',
                      scenario: 'cpp-ios',
                      platforms: 'ios',
                      langs: 'c++',
                      runs_ios: true,
                      runs_android: false,
                    },
                    {
                      package_type: 'module',
                      scenario: 'cpp-android',
                      platforms: 'android',
                      langs: 'c++',
                      runs_ios: false,
                      runs_android: true,
                    },
                    {
                      package_type: 'view',
                      scenario: 'swift-kotlin',
                      platforms: 'ios,android',
                      langs: 'swift,kotlin',
                      runs_ios: true,
                      runs_android: true,
                    },
                    {
                      package_type: 'view',
                      scenario: 'swift',
                      platforms: 'ios',
                      langs: 'swift',
                      runs_ios: true,
                      runs_android: false,
                    },
                    {
                      package_type: 'view',
                      scenario: 'kotlin',
                      platforms: 'android',
                      langs: 'kotlin',
                      runs_ios: false,
                      runs_android: true,
                    },
                  ]

                  const enrich = (item, extra = {}) => ({
                    ...item,
                    ...extra,
                    package_dir: `react-native-test-${item.package_type}-${item.scenario}`,
                  })

                  const generation = pms.flatMap(pm =>
                    scenarios.map(item => enrich(item, { pm }))
                  )
                  const iosHarness = scenarios
                    .filter(item => item.runs_ios)
                    .map(item => enrich(item, { pm: 'bun', mode: 'Debug' }))
                  const androidHarness = scenarios
                    .filter(item => item.runs_android)
                    .map(item => enrich(item, { pm: 'bun', mode: 'Debug' }))

                  console.log(`generation=${JSON.stringify({ include: generation })}`)
                  console.log(`ios_harness=${JSON.stringify({ include: iosHarness })}`)
                  console.log(`android_harness=${JSON.stringify({ include: androidHarness })}`)
                  NODE

    generate-packages:
        name: Generate ${{ matrix.package_type }} - ${{ matrix.scenario }} - ${{ matrix.pm }}
        needs: [lint-and-build, define-matrix]
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.define-matrix.outputs.generation) }}
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - uses: actions/checkout@v7

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions Bot"
                  git config --global user.email "actions@github.com"

            - name: Setup Node.js
              if: matrix.pm == 'yarn'
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x

            - name: Setup Bun.js
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache dependencies (bun)
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install repository dependencies
              run: bun install

            - name: Build CLI and Link Locally
              run: |
                  bun run build
                  ${{ matrix.pm }} link

            - name: Generate package
              run: |
                  ${{ matrix.pm }} create nitro-module test-${{ matrix.package_type }}-${{ matrix.scenario }} \
                    --skip-install \
                    --include-harness \
                    --ci \
                    --package-type ${{ matrix.package_type }} \
                    --platforms ${{ matrix.platforms }} \
                    --langs ${{ matrix.langs }}

            - name: Verify generated package structure
              shell: bash
              run: |
                  PACKAGE_DIR="${{ matrix.package_dir }}"
                  if [ ! -d "$PACKAGE_DIR" ]; then
                    echo "Package directory not found: $PACKAGE_DIR"
                    ls -la
                    exit 1
                  fi

                  cd "$PACKAGE_DIR"

                  REQUIRED_PATHS=(
                    "package.json"
                    "README.md"
                    "src/"
                    "example/"
                  )

                  if [ "${{ matrix.runs_android }}" = "true" ]; then
                    REQUIRED_PATHS+=("android/")
                  fi

                  if [ "${{ matrix.runs_ios }}" = "true" ]; then
                    REQUIRED_PATHS+=("ios/")
                  fi

                  for path in "${REQUIRED_PATHS[@]}"; do
                    if [ ! -e "$path" ]; then
                      echo "Missing required file/directory: $path"
                      ls -la
                      exit 1
                    fi
                    echo "Found: $path"
                  done

                  if [ "${{ matrix.runs_android }}" != "true" ] && [ -e "android" ]; then
                    echo "Unexpected android directory for scenario ${{ matrix.scenario }}"
                    exit 1
                  fi

                  if [ "${{ matrix.runs_ios }}" != "true" ] && [ -e "ios" ]; then
                    echo "Unexpected ios directory for scenario ${{ matrix.scenario }}"
                    exit 1
                  fi

                  if [ "${{ matrix.runs_ios }}" = "true" ] && ! find . -maxdepth 1 -name "*.podspec" | grep -q .; then
                    echo "Expected podspec for iOS-enabled scenario"
                    exit 1
                  fi

                  if [ "${{ matrix.runs_ios }}" != "true" ] && find . -maxdepth 1 -name "*.podspec" | grep -q .; then
                    echo "Unexpected podspec for Android-only scenario"
                    exit 1
                  fi

            - name: Verify generated harness scripts
              shell: bash
              run: |
                  cd "${{ matrix.package_dir }}"

                  if [ "${{ matrix.runs_android }}" = "true" ] && ! grep -q '"test:harness:android"' example/package.json; then
                    echo "Missing Android Harness script in example/package.json"
                    cat example/package.json
                    exit 1
                  fi

                  if [ "${{ matrix.runs_ios }}" = "true" ] && ! grep -q '"test:harness:ios"' example/package.json; then
                    echo "Missing iOS Harness script in example/package.json"
                    cat example/package.json
                    exit 1
                  fi

            - name: Test package.json content
              shell: bash
              run: |
                  cd "${{ matrix.package_dir }}"
                  if ! grep -q "react-native-test-${{ matrix.package_type }}-${{ matrix.scenario }}" package.json; then
                    echo "Package name not correct in package.json"
                    cat package.json
                    exit 1
                  fi
                  if ! grep -q '"scripts"' package.json; then
                    echo "Scripts section missing from package.json"
                    exit 1
                  fi
                  echo "package.json structure validated"

            - name: Upload generated package
              uses: actions/upload-artifact@v7
              with:
                  name: test-${{ matrix.package_type }}-${{ matrix.scenario }}-${{ matrix.pm }}
                  path: ${{ matrix.package_dir }}
                  include-hidden-files: true
                  if-no-files-found: error
                  retention-days: 7

    harness-android:
        name: Android Harness - ${{ matrix.package_type }} - ${{ matrix.scenario }}
        needs: [generate-packages, define-matrix]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.define-matrix.outputs.android-harness) }}
        env:
            AVD_DISK_SIZE: 1G
            AVD_HEAP_SIZE: 1G
            AVD_NAME: Pixel_7_API_36
            DEVICE_API_LEVEL: '36'
            DEVICE_ARCH: x86_64
            DEVICE_PROFILE: pixel_7
            WORKING_DIR: ${{ github.workspace }}/${{ matrix.package_dir }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Create working directory
              run: mkdir -p ${{ env.WORKING_DIR }}

            - name: Download generated package
              uses: actions/download-artifact@v8
              with:
                  name: test-${{ matrix.package_type }}-${{ matrix.scenario }}-${{ matrix.pm }}
                  path: ${{ env.WORKING_DIR }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              uses: ./.github/actions/install-deps
              with:
                  pm: ${{ matrix.pm }}
                  working-directory: ${{ env.WORKING_DIR }}

            - name: Run codegen and build
              uses: ./.github/actions/run-codegen-build
              with:
                  pm: ${{ matrix.pm }}
                  working-directory: ${{ env.WORKING_DIR }}

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: 'zulu'
                  java-version: '17'
                  cache: 'gradle'

            - name: Build Android app
              working-directory: ${{ env.WORKING_DIR }}/example/android
              run: |
                  chmod +x ./gradlew
                  ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=${{ env.DEVICE_ARCH }}

            - name: Run React Native Harness
              uses: callstackincubator/react-native-harness@v1.2.0
              with:
                  app: android/app/build/outputs/apk/debug/app-debug.apk
                  runner: android
                  projectRoot: ${{ env.WORKING_DIR }}/example
                  packageManager: ${{ matrix.pm }}

            - name: Stop Gradle
              if: always()
              working-directory: ${{ env.WORKING_DIR }}/example/android
              run: |
                  chmod +x ./gradlew
                  ./gradlew --stop

    harness-ios:
        name: iOS Harness - ${{ matrix.package_type }} - ${{ matrix.scenario }}
        needs: [generate-packages, define-matrix]
        runs-on: macos-26
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.define-matrix.outputs.ios-harness) }}
        env:
            WORKING_DIR: ${{ github.workspace }}/${{ matrix.package_dir }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

            - name: Create working directory
              run: mkdir -p ${{ env.WORKING_DIR }}

            - name: Download generated package
              uses: actions/download-artifact@v8
              with:
                  name: test-${{ matrix.package_type }}-${{ matrix.scenario }}-${{ matrix.pm }}
                  path: ${{ env.WORKING_DIR }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              uses: ./.github/actions/install-deps
              with:
                  pm: ${{ matrix.pm }}
                  working-directory: ${{ env.WORKING_DIR }}

            - name: Run codegen and build
              uses: ./.github/actions/run-codegen-build
              with:
                  pm: ${{ matrix.pm }}
                  working-directory: ${{ env.WORKING_DIR }}

            - name: Cache Pods
              uses: actions/cache@v5
              with:
                  path: ${{ env.WORKING_DIR }}/example/ios/Pods
                  key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-pods-

            - name: Run pod install
              working-directory: ${{ env.WORKING_DIR }}/example/ios
              run: pod install

            - name: Build iOS app
              uses: ./.github/actions/ios-build-xcode
              with:
                  ios-dir: ${{ env.WORKING_DIR }}/example/ios
                  mode: ${{ matrix.mode }}

            - name: Run iOS Harness Tests
              working-directory: ${{ env.WORKING_DIR }}/example
              shell: bash
              run: |
                  IOS_SIMULATOR="$(xcrun simctl list devices available --json | IOS_VERSION=26.5 node -e 'const fs = require("node:fs"); const input = fs.readFileSync(0, "utf8"); const data = JSON.parse(input); const desiredVersion = process.env.IOS_VERSION; const candidates = Object.entries(data.devices).flatMap(([runtime, devices]) => { const version = runtime.match(/iOS-(\d+(?:-\d+)*)$/)?.[1]?.replaceAll("-", "."); if (version == null || (desiredVersion != null && version !== desiredVersion)) return []; return devices.filter(device => device.isAvailable === true && device.name.startsWith("iPhone")).map(device => ({ name: device.name, version })); }); candidates.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }) || b.name.localeCompare(a.name, undefined, { numeric: true })); const selected = candidates[0]; if (selected == null) process.exit(1); console.log(`${selected.name}|${selected.version}`);' || true)"
                  if [ -z "$IOS_SIMULATOR" ]; then
                    echo "Unable to resolve an available iOS simulator."
                    xcrun simctl list devices available
                    exit 1
                  fi

                  APP_PATH="$(find ios/build/Build/Products/Debug-iphonesimulator -maxdepth 1 -type d -name '*.app' | head -1)"
                  if [ -z "$APP_PATH" ]; then
                    echo "No built iOS app bundle found in ios/build/Build/Products/Debug-iphonesimulator"
                    exit 1
                  fi

                  DEVICE_MODEL="${IOS_SIMULATOR%%|*}" IOS_VERSION="${IOS_SIMULATOR#*|}" HARNESS_APP_PATH="$APP_PATH" ${{ matrix.pm }} run test:harness:ios
